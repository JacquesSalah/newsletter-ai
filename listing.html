  ];

  const PER_PAGE = 10;
  let currentPage = 1;
  const totalPages = Math.ceil(allNews.length / PER_PAGE);

  function renderPage(page) {
    currentPage = page;
    const start = (page - 1) * PER_PAGE;
    const items = allNews.slice(start, start + PER_PAGE);

    document.getElementById('page-count').textContent = `Página ${page} de ${totalPages}`;

    const container = document.getElementById('listing-container');
    container.innerHTML = items.map(n => `
      <a class="listing-item" href="#">
        <img class="listing-item-img" src="${n.img}" alt="${n.cat}" loading="lazy" />
        <div class="listing-item-body">
          <p class="listing-item-cat">${n.cat}</p>
          <p class="listing-item-title">${n.title}</p>
          <p class="listing-item-summary">${n.summary}</p>
          <p class="listing-item-meta">${n.date} · ${n.author}</p>
        </div>
      </a>
    `).join('');

    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderPagination() {
    const nav = document.getElementById('pagination');
    let html = '';

    // Prev
    html += `<button class="nav-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="renderPage(${currentPage - 1})">← Anterior</button>`;

    // Pages
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="renderPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 2) {
        html += `<span class="dots">…</span>`;
      }
    }

    // Next
    html += `<button class="nav-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="renderPage(${currentPage + 1})">Próxima →</button>`;

    nav.innerHTML = html;
  }

  // Init
  renderPage(1);
</script>
